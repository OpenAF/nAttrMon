input: 	
   name         : Filesystem volumes check
   cron         : "*/5 * * * *"
   waitForFinish: true
   onlyOnEvent  : true
   execFrom     : nInput_Filesystem
   execArgs     : 
     attrTemplate: Filesystem/Volumes
     execTimeout: 120000
     volumeNames :
      - /some/path/1
      - /some/path/2